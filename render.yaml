services:
  - type: web
    name: flower-shop
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 1
    healthCheckPath: /
    disk:
      name: flower-shop-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_PATH
        value: /data/flower_shop.db
      - key: FLASK_DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
