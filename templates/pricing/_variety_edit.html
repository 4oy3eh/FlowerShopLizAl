{#
  Inline edit form for one tulip variety.
  Loaded via HTMX GET /pricing/variety/<id>/edit.
  Required var: v (variety row)
#}

<div id="variety-row-{{ v['id'] }}"
     class="py-3 border-b border-gray-50 last:border-0">

  <div class="flex items-baseline gap-2 mb-2">
    <span class="font-medium text-gray-800 text-sm">{{ v['name'] }}</span>
    <span class="text-xs text-gray-400">закуп {{ "%.0f"|format(v['purchase_price']) }} ₴</span>
  </div>

  <form hx-post="/pricing/update/variety/{{ v['id'] }}"
        hx-target="#variety-row-{{ v['id'] }}"
        hx-swap="outerHTML"
        class="flex items-center gap-2">

    <input type="number"
           name="new_price"
           value="{{ "%.0f"|format(v['current_sell_price']) }}"
           min="0"
           step="1"
           inputmode="decimal"
           required
           autofocus
           class="w-28 rounded-xl border border-pink-300 text-lg font-bold px-3 py-2
                  text-center focus:outline-none focus:ring-2 focus:ring-pink-400">

    <span class="text-gray-500 text-sm font-medium">₴</span>

    <button type="submit"
            class="px-4 py-2 rounded-xl bg-pink-600 text-white text-sm font-semibold
                   active:bg-pink-700 transition">
      Сохранить
    </button>

    <button type="button"
            hx-get="/pricing/variety/{{ v['id'] }}"
            hx-target="#variety-row-{{ v['id'] }}"
            hx-swap="outerHTML"
            class="px-3 py-2 rounded-xl border border-gray-200 text-gray-500 text-sm
                   active:bg-gray-50 transition">
      ✕
    </button>

  </form>
</div>
