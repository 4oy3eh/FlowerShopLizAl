{#
  Inline edit form for one system_settings entry.
  Required vars: s (system_settings row), SETTING_LABELS (from context processor)
#}

<div id="setting-row-{{ s['key'] }}"
     class="py-3 border-b border-gray-50 last:border-0">

  <div class="font-medium text-gray-800 text-sm mb-2">
    {{ SETTING_LABELS.get(s['key'], s['key']) }}
  </div>

  <form hx-post="/pricing/update/setting/{{ s['key'] }}"
        hx-target="#setting-row-{{ s['key'] }}"
        hx-swap="outerHTML"
        class="flex items-center gap-2">

    <input type="number"
           name="new_price"
           value="{{ s['value'] }}"
           min="0"
           step="1"
           inputmode="decimal"
           required
           autofocus
           class="w-28 rounded-xl border border-pink-300 text-lg font-bold px-3 py-2
                  text-center focus:outline-none focus:ring-2 focus:ring-pink-400">

    <span class="text-gray-500 text-sm font-medium">₴</span>

    <button type="submit"
            class="px-4 py-2 rounded-xl bg-pink-600 text-white text-sm font-semibold
                   active:bg-pink-700 transition">
      Сохранить
    </button>

    <button type="button"
            hx-get="/pricing/setting/{{ s['key'] }}"
            hx-target="#setting-row-{{ s['key'] }}"
            hx-swap="outerHTML"
            class="px-3 py-2 rounded-xl border border-gray-200 text-gray-500 text-sm
                   active:bg-gray-50 transition">
      ✕
    </button>

  </form>
</div>
